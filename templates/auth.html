{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-950 px-6">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-max-w-md shadow-2xl">
        <h2 class="text-3xl font-black text-white mb-2">
            {{ 'Create Account' if mode == 'signup' else 'Welcome Back' }}
        </h2>
        <p class="text-slate-400 text-sm mb-8">Join LOGRA to unlock market trends.</p>

        <form method="POST">
            <div class="mb-4">
                <label class="text-xs font-bold text-slate-500 uppercase">Email Address</label>
                <input type="email" name="email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white mt-1 focus:border-blue-500 outline-none">
            </div>
            <div class="mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase">Password</label>
                <input type="password" name="password" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white mt-1 focus:border-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all">
                {{ 'Sign Up' if mode == 'signup' else 'Login' }}
            </button>
        </form>

        <div class="mt-6 text-center">
            {% if mode == 'signup' %}
            <p class="text-slate-500 text-sm">Already have an account? <a href="/login" class="text-blue-400 font-bold">Login</a></p>
            {% else %}
            <p class="text-slate-500 text-sm">Need an account? <a href="/signup" class="text-blue-400 font-bold">Sign Up</a></p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
