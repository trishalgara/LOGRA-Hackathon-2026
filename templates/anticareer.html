{% extends "base.html" %}
{% block content %}
<main class="max-w-4xl mx-auto py-20 px-6 min-h-screen">
    <a href="/" class="text-slate-500 text-xs font-bold uppercase mb-12 block hover:text-white">← Dashboard</a>
    <h1 class="text-6xl font-black mb-8 tracking-tight">Anti-<span class="gradient-text">Career</span></h1>
    <p class="text-slate-400 mb-12 italic">What is the one task or environment you absolutely HATE?</p>

    <div class="flex gap-4 mb-16">
        <input type="text" id="hateInput" placeholder="e.g. Sitting in an office all day / Coding alone..." class="flex-1 bg-slate-900 border border-slate-800 p-5 rounded-3xl outline-none focus:border-amber-500">
        <button onclick="runAnti()" class="bg-amber-600 px-10 py-5 rounded-3xl font-black uppercase text-xs tracking-widest">Flip it</button>
    </div>

    <div id="results" class="grid gap-6"></div>
</main>

<script>
async function runAnti() {
    const input = document.getElementById('hateInput').value;
    const res = document.getElementById('results');
    res.innerHTML = '<p class="text-center animate-pulse text-amber-500">Flipping your perspective...</p>';

    const response = await fetch('/api/logra-engine', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({feature: 'anticareer', input: input})
    });
    const result = await response.json();
    
    if(result.status === 'success') {
        res.innerHTML = result.data.map(item => `
            <div class="glass-card p-8 rounded-[40px] border-l-4 border-amber-500">
                <h3 class="text-2xl font-bold mb-2">${item.title}</h3>
                <p class="text-slate-400 text-sm mb-4">${item.reason}</p>
                <div class="bg-amber-500/10 p-3 rounded-xl text-amber-500 text-xs font-bold uppercase">The Perk: ${item.perk}</div>
            </div>
        `).join('');
    }
}
</script>
{% endblock %}
